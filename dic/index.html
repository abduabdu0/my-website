<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
<link rel="icon" href="images.jpg">
<title>Забономӯзӣ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

</head>
<body>
<div class="app">
  <div class="header"><span>📚 Забономӯзӣ</span></div>

<div class="install-banner" id="installBanner">
  <p>Нажмите «Установить», чтобы добавить приложение на главный экран.</p>
  <button id="installBtn">Установить</button>
  <button id="closeInstallBtn" class="text-button">Закрыть</button>
</div>

<!-- Выбор языка -->
<div class="card" id="languageSelect" style="display:none">
<h3 style="text-align:center;color:#667eea;margin-top:0">🌍 Выберите язык:</h3>
<div class="lesson-progress" id="languageList"></div>
</div>

<!-- Алфавит -->
<div class="card" id="alphabet" style="display:none">
<button onclick="goMenu()" class="text-button">← Вернуться</button>
<h3 style="color:#667eea;margin-top:10px;text-align:center">🔤 Алфавит</h3>
<div id="alphabetGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:20px 0"></div>
</div>

<!-- Карточка буквы -->
<div class="card" id="letterCard" style="display:none">
<button onclick="goAlphabet()" class="text-button">← К алфавиту</button>
<div style="text-align:center;margin:20px 0">
  <div style="font-size:80px;margin-bottom:15px" id="letterDisplay"></div>
  <div id="letterImage" style="font-size:60px;margin:10px auto;text-align:center"></div>
  <h2 id="letterName" style="color:#667eea;margin:10px 0"></h2>
  <p id="letterSound" style="font-size:18px;color:#666;margin:10px 0"></p>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0">
    <button onclick="playLetterSound()" class="text-button" style="width:auto;margin:0;padding:10px 20px">🔊 Слушать</button>
    <button onclick="startRecording()" id="recordBtn" class="text-button" style="width:auto;margin:0;padding:10px 20px;background:#4CAF50">🎤 Записать</button>
    <button onclick="stopRecording()" id="stopBtn" class="text-button" style="width:auto;margin:0;padding:10px 20px;background:#ff9800;display:none">⏹️ Стоп</button>
  </div>
  <div id="recordingResult" style="margin:15px 0;padding:10px;border-radius:8px;display:none;background:#f0f0f0">
    <p id="resultText" style="margin:0;color:#333"></p>
  </div>
</div>
<div style="background:#f9f9f9;padding:15px;border-radius:10px;margin:20px 0">
  <h4 style="color:#ff9800">Примеры слов:</h4>
  <div id="examplesDiv"></div>
</div>
</div>

<!-- Главное меню -->
<div class="card" id="menu" style="display:block">
<div id="currentLang" style="text-align:center;font-size:14px;color:#667eea;margin-bottom:10px;font-weight:600"></div>
<div id="stats"></div>
<button onclick="showLanguageSelect()" style="background:#764ba2;margin-bottom:20px">🌍 Сменить язык</button>

<button onclick="goAlphabet()" style="background:#FF6B6B;margin-bottom:5px">🔤 Алфавит</button>
<button onclick="goLessons()">📖 Уроки с теорией</button>
<button onclick="start('easy')">🎓 Тренировка: Лёгкий уровень</button>
<button onclick="start('medium')">📖 Тренировка: Средний уровень</button>
<button onclick="start('hard')">🔥 Тренировка: Сложный уровень</button>
<button onclick="start('all')">⭐ Смешанные задания</button>
</div>

<!-- Уроки с теорией -->
<div class="card" id="lessons" style="display:none">
<h3 style="text-align:center;color:#667eea;margin-top:0">Выберите тему урока:</h3>
<div class="lesson-progress" id="lessonsList"></div>
<button onclick="goMenu()" class="text-button">← Вернуться</button>
</div>

<!-- Теория урока -->
<div class="card" id="theory-view" style="display:none">
<button onclick="goLessons()" class="text-button">← Назад к урокам</button>
<h3 style="color:#667eea;margin-top:10px" id="theoryTitle"></h3>
<div id="theoryContent"></div>
<button onclick="startLesson()">Начать упражнения →</button>
</div>

<!-- Игра/упражнение -->
<div class="card" id="game" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
  <span id="progress" style="font-weight:600;color:#667eea"></span>
  <button id="audioBtn" onclick="toggleAudio()" class="text-button" style="width:auto;margin:0;padding:8px 15px">🔊 Слушать</button>
</div>
<div id="sentence" class="sentence"></div>
<div id="choices"></div>

<button onclick="check()">✅ Проверить</button>
<button onclick="showAnswer()" id="hintBtn">💡 Подсказка</button>
<button onclick="next()">➡️ Далее</button>
<button onclick="goMenu()">🏠 Меню</button>

<div id="result"></div>
</div>

<!-- Результаты -->
<div class="card" id="results" style="display:none">
<h3 style="text-align:center;color:#667eea">Результаты:</h3>
<div id="resultStats" style="font-size:18px;text-align:center;line-height:2"></div>
<button onclick="goMenu()">🏠 В главное меню</button>
</div>
</div>


</body>
</html>
