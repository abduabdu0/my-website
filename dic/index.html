<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Диктант Pro MAX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<style>
:root{--accent:#0A84FF;--bg:#f2f2f7;--card:#fff;--good:#16a34a;--bad:#ef4444}
body{margin:0;font-family:-apple-system;background:var(--bg)}
.app{max-width:420px;margin:auto}
.header{padding:15px;text-align:center;background:#111;color:#fff}
.card{background:var(--card);margin:15px;border-radius:16px;padding:15px;box-shadow:0 10px 20px rgba(0,0,0,.1)}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;background:var(--accent);color:#fff}
.install-banner{display:none;position:fixed;left:15px;right:15px;bottom:15px;padding:12px 14px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.12);gap:10px;align-items:center;justify-content:space-between;z-index:1000;}
.install-banner p{margin:0;font-size:14px;color:#111;flex:1}
.install-banner button{width:auto;min-width:130px}
.text-button{background:transparent;color:#0A84FF;font-weight:700;box-shadow:none}
.sentence{font-size:18px;margin-bottom:10px}
.gap{border-bottom:2px dashed #999;padding:2px 5px}
.row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:8px 10px;background:#e5e7eb;border-radius:8px;cursor:pointer}
.chip.active{background:var(--accent);color:#fff;transform:scale(1.1)}
.good{color:var(--good)}
.bad{color:var(--bad)}
</style>
</head>
<body>
<div class="app">
<div class="header">📚 Диктант Pro MAX</div>
<div class="install-banner" id="installBanner">
  <p>Нажмите «Установить», чтобы добавить приложение на главный экран.</p>
  <button id="installBtn">Установить</button>
  <button id="closeInstallBtn" class="text-button">Закрыть</button>
</div>

<div class="card" id="menu">
<button onclick="start('easy')">Лёгкий</button>
<button onclick="start('medium')">Средний</button>
<button onclick="start('hard')">Сложный</button>
</div>

<div class="card" id="game" style="display:none">
<div id="sentence" class="sentence"></div>
<div id="choices"></div>

<button onclick="check()">Проверить</button>
<button onclick="showAnswer()">Показать ответ</button>
<button onclick="next()">Далее</button>
<button onclick="goMenu()">Меню</button>

<div id="result"></div>
</div>
</div>

<script>
function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

// 26 заданий
const tasks=[
 {text:'Он учи_ся в школ_',gaps:[{i:6,options:['т','ть','д','л'],correct:'т'},{i:17,options:['е','и','а','о'],correct:'е'}]},
 {text:'Птиц_ летят над рощ_й',gaps:[{i:4,options:['ы','и','а','я'],correct:'ы'},{i:20,options:['е','о','а','у'],correct:'е'}]},
 {text:'Жи_нь прекрасна',gaps:[{i:2,options:['з','с','ш','щ'],correct:'з'}]},
 {text:'Он берё_ книгу',gaps:[{i:6,options:['т','ть','д','п'],correct:'т'}]},
 {text:'Малыш плач_т',gaps:[{i:10,options:['е','и','а','о'],correct:'е'}]},
 {text:'Ребёнок смеёт_ся',gaps:[{i:14,options:['с','сь'],correct:'с'}]},
 {text:'Мы ид_м домой',gaps:[{i:6,options:['е','ё','и','а'],correct:'ё'}]},
 {text:'На улиц_ холодно',gaps:[{i:7,options:['е','и','а','о'],correct:'е'}]},
 {text:'Он чита_т книгу',gaps:[{i:8,options:['е','и','а','о'],correct:'е'}]},
 {text:'Солнц_ светит',gaps:[{i:6,options:['е','и','а','о'],correct:'е'}]},
 {text:'Машин_ едет',gaps:[{i:6,options:['а','о','е','и'],correct:'а'}]},
 {text:'Кошк_ спит',gaps:[{i:5,options:['а','о','е','и'],correct:'а'}]},
 {text:'Он люб_т играть',gaps:[{i:6,options:['и','ы','е','о'],correct:'и'}]},
 {text:'Мы уч_мся вместе',gaps:[{i:5,options:['и','е','а','о'],correct:'и'}]},
 {text:'Собак_ бежит',gaps:[{i:5,options:['а','о','е','и'],correct:'а'}]},
 {text:'Дерев_ высокое',gaps:[{i:7,options:['о','а','е','и'],correct:'о'}]},
 {text:'Мор_ синее',gaps:[{i:4,options:['е','я','а','о'],correct:'е'}]},
 {text:'Зим_ холодная',gaps:[{i:3,options:['а','о','е','и'],correct:'а'}]},
 {text:'Весн_ пришла',gaps:[{i:5,options:['а','о','е','и'],correct:'а'}]},
 {text:'Лет_ жаркое',gaps:[{i:4,options:['о','а','е','и'],correct:'о'}]},
 {text:'Осен_ дождливая',gaps:[{i:5,options:['ь','н','л','й'],correct:'ь'}]},
 {text:'Он пиш_т письмо',gaps:[{i:7,options:['е','и','а','о'],correct:'е'}]},
 {text:'Она по_т песню',gaps:[{i:7,options:['ё','е','и','а'],correct:'ё'}]},
 {text:'Они сид_т дома',gaps:[{i:8,options:['я','а','е','и'],correct:'я'}]},
 {text:'Учител_ объясняет',gaps:[{i:7,options:['ь','й','е','и'],correct:'ь'}]},
 {text:'Мальчи_ играет',gaps:[{i:6,options:['к','г','ч','ш'],correct:'к'}]}
];

let current=0,answers=[];

function start(){
current=0;
document.getElementById('menu').style.display='none';
document.getElementById('game').style.display='block';
load();
}

function load(){
answers=[];
const item=tasks[current];
let s=item.text.split('');

item.gaps.forEach((g,i)=>{
s[g.i]=`<span class="gap" data-gap="${i}">_</span>`;
});

document.getElementById('sentence').innerHTML=s.join('');

const choices=document.getElementById('choices');
choices.innerHTML='';

item.gaps.forEach((g,i)=>{
let row=document.createElement('div');
row.className='row';

shuffle(g.options).forEach(opt=>{
let chip=document.createElement('div');
chip.className='chip';
chip.innerText=opt;
chip.onclick=()=>select(i,opt,chip);
row.appendChild(chip);
});

choices.appendChild(row);
});
}

function select(i,val,el){
let chips=el.parentElement.querySelectorAll('.chip');
chips.forEach(c=>c.classList.remove('active'));
el.classList.add('active');
answers[i]=val;
document.querySelector(`[data-gap='${i}']`).innerText=val;
}

function check(){
const item=tasks[current];
let errors=0,res='';

item.gaps.forEach((g,i)=>{
let gap=document.querySelector(`[data-gap='${i}']`);

if(answers[i]===g.correct){
gap.style.color='green';
res+='<div class="good">✔ правильно</div>';
}else{
gap.style.color='red';
res+=`<div class="bad">✖ ошибка → ${g.correct}</div>`;
errors++;
}
});

document.getElementById('result').innerHTML=res+`<br>Ошибок: ${errors}`;
}

function showAnswer(){
const item=tasks[current];
item.gaps.forEach((g,i)=>{
let gap=document.querySelector(`[data-gap='${i}']`);
gap.innerText=g.correct;
gap.style.color='green';
});
}

function next(){
current++;
if(current>=tasks.length) current=0;
document.getElementById('result').innerHTML='';
load();
}

function goMenu(){
document.getElementById('game').style.display='none';
document.getElementById('menu').style.display='block';
}

const installKey = 'pwaInstallPromptShown';
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const closeInstallBtn = document.getElementById('closeInstallBtn');

function hideInstallBanner() {
  installBanner.style.display = 'none';
  localStorage.setItem(installKey, '1');
}

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredPrompt = event;
  if (!localStorage.getItem(installKey)) {
    installBanner.style.display = 'flex';
  }
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const choiceResult = await deferredPrompt.userChoice;
    if (choiceResult.outcome === 'accepted') {
      console.log('Пользователь установил приложение');
    } else {
      console.log('Пользователь отказался от установки');
    }
    deferredPrompt = null;
    hideInstallBanner();
    return;
  }

  alert('Установка доступна через меню браузера: выберите «Добавить на главный экран» или «Установить приложение».');
  hideInstallBanner();
});

closeInstallBtn.addEventListener('click', hideInstallBanner);
window.addEventListener('appinstalled', () => {
  hideInstallBanner();
  localStorage.setItem(installKey, '1');
});

window.addEventListener('load', () => {
  if (!localStorage.getItem(installKey)) {
    installBanner.style.display = 'flex';
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch((err) => console.error('SW registration failed:', err));
  }
});
</script>
</body>
</html>
