<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#2563eb" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="МоёАпп" />
<link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

<title>💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0018;
    padding: 1.2rem;
    min-height: 100vh;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
    pointer-events: none;
  }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Разные размеры для красивой мозаики */
  .card { grid-column: span 1; grid-row: span 1; }
  .card.wide  { grid-column: span 2; }
  .card.tall  { grid-row: span 2; }
  .card.big   { grid-column: span 2; grid-row: span 2; }

  .card {
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,105,180,0.06);
    border: 1px solid rgba(255,105,180,0.15);
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    min-height: 220px;
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 16px 50px rgba(255,105,180,0.2);
    border-color: rgba(255,105,180,0.4);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    min-height: 220px;
  }

  .card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    min-height: 220px;
  }

  /* видео карточки чуть другой цвет рамки */
  .card.vid {
    background: rgba(199,125,255,0.06);
    border-color: rgba(199,125,255,0.15);
  }
  .card.vid:hover {
    box-shadow: 0 16px 50px rgba(199,125,255,0.2);
    border-color: rgba(199,125,255,0.4);
  }

  @media (max-width: 700px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 420px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .card.wide, .card.big  { grid-column: span 1; }
    .card.tall, .card.big  { grid-row: span 1; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="grid">

  <!-- ФОТО -->
  <div class="card big">   <img src="WhatsApp Image 2026-03-12 at 21.16.23.jpeg" alt=""> </div>
  <div class="card">       <img src="WhatsApp Image 2026-03-12 at 21.17.45.jpeg" alt=""> </div>
  <div class="card">       <img src="WhatsApp Image 2026-03-12 at 21.11.06.jpeg" alt=""> </div>
  <div class="card">       <img src="Без имени.jpg" alt=""> </div>
  <div class="card tall">  <img src="WhatsApp Image 2026-03-12 at 21.27.12.jpeg" alt=""> </div>

  <!-- ВИДЕО -->
  <div class="card vid">      <video src="WhatsApp Video 2026-03-12 at 21.10.04.mp4" controls></video> </div>

</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
function rsz() { cv.width = innerWidth; cv.height = innerHeight; }
rsz(); window.addEventListener('resize', rsz);
const stars = Array.from({length: 160}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.2+0.2, a: Math.random(),
  sp: Math.random()*0.004+0.002, tw: Math.random()*Math.PI*2
}));
(function loop() {
  cx.clearRect(0, 0, cv.width, cv.height);
  stars.forEach(s => {
    s.tw += s.sp;
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(255,210,230,${(Math.sin(s.tw)*0.4+0.6)*s.a})`;
    cx.fill();
  });
  requestAnimationFrame(loop);
})();
</script>

<div id="pwa-banner" style="
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 420px;
  background: #1e293b;
  color: #fff;
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  z-index: 9999;
  font-family: sans-serif;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: slideUp 0.4s ease;
">
  <img src="/icons/icon-192x192.png" width="48" height="48" style="border-radius: 10px; flex-shrink: 0;" alt="icon" />
  <div style="flex: 1;">
    <div style="font-weight: 600; font-size: 15px; margin-bottom: 3px;">Установить приложение</div>
    <div style="font-size: 13px; color: #94a3b8;">Добавить на главный экран для быстрого доступа</div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;">
    <button id="pwa-install-btn" style="
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    ">Установить</button>
    <button id="pwa-close-btn" style="
      background: transparent;
      color: #64748b;
      border: none;
      font-size: 12px;
      cursor: pointer;
      padding: 4px;
    ">Не сейчас</button>
  </div>
</div>

<!-- Баннер для iOS (отдельный, т.к. iOS не поддерживает авто-промпт) -->
<div id="ios-banner" style="
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 420px;
  background: #1e293b;
  color: #fff;
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  z-index: 9999;
  font-family: sans-serif;
">
  <button id="ios-close" style="float:right; background:none; border:none; color:#94a3b8; font-size:20px; cursor:pointer; line-height:1;">×</button>
  <div style="font-weight: 600; font-size: 15px; margin-bottom: 8px;">📲 Установить приложение</div>
  <div style="font-size: 13px; color: #94a3b8; line-height: 1.6;">
    Нажмите <strong style="color:#fff;">«Поделиться»</strong> 
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" style="vertical-align:middle;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    внизу экрана, затем <strong style="color:#fff;">«На экран Домой»</strong>
  </div>
</div>

<style>
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(30px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
<script>
// Регистрация Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}

// Проверка — уже установлено?
const isInstalled = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone;

if (!isInstalled) {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  // iOS Safari — показываем инструкцию
  if (isIOS && isSafari) {
    const shown = sessionStorage.getItem('ios-banner-shown');
    if (!shown) {
      setTimeout(() => {
        const banner = document.getElementById('ios-banner');
        banner.style.display = 'block';
        sessionStorage.setItem('ios-banner-shown', '1');
      }, 2000);
      document.getElementById('ios-close').addEventListener('click', () => {
        document.getElementById('ios-banner').style.display = 'none';
      });
    }
  }

  // Android / Chrome Desktop — стандартный промпт установки
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;

    const banner = document.getElementById('pwa-banner');
    banner.style.display = 'flex';

    document.getElementById('pwa-install-btn').addEventListener('click', async () => {
      banner.style.display = 'none';
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    document.getElementById('pwa-close-btn').addEventListener('click', () => {
      banner.style.display = 'none';
    });
  });

  // Скрыть баннер если уже установили
  window.addEventListener('appinstalled', () => {
    document.getElementById('pwa-banner').style.display = 'none';
  });
}
</script>
</body>
</html>
